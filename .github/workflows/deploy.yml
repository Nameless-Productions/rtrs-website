name: Deploy to gh pages

on:
    workflow_dispatch:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: setup pnpm
              uses: pnpm/action-setup@v4
              with:
                version: latest

            - name: setup node
              uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: 'pnpm'

            - name: Install
              run: pnpm install

            - name: build
              run: pnpm build

            - name: deploy
              uses: peaceiris/actions-gh-pages@v4
              with: 
                github_token: ${{ secrets.GITHUB_TOKEN }}
                publish_dir: ./dist
                cname: right-to-roam-studios.site